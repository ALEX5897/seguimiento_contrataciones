server {
    listen 80;
    server_name 172.16.1.72;

    root /opt/seguimiento_contrataciones/frontend/dist;
    index index.html;

    access_log /var/log/nginx/seguimiento_poa_qt.access.log;
    error_log  /var/log/nginx/seguimiento_poa_qt.error.log;

    # Activa mantenimiento creando el archivo: /opt/seguimiento_contrataciones/.maintenance
    if (-f /opt/seguimiento_contrataciones/.maintenance) {
        return 503;
    }

    error_page 503 @maintenance;

    location @maintenance {
        root /opt/seguimiento_contrataciones/infra/nginx;
        try_files /maintenance.html =503;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /maintenance.html {
        root /opt/seguimiento_contrataciones/infra/nginx;
        internal;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
